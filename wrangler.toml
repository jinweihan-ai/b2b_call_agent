name = "b2b-call-agent"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Local dev: copy .dev.vars.example to .dev.vars and fill in.
# Production:  wrangler secret put NAME   (one per secret below)

# Non-secret vars (none in M1 — all 4 are secrets).
# [vars]
# EXAMPLE = "value"

# M2 — call replay storage (Workers KV).
# `id` = production namespace (Cloudflare-account-scoped).
# `preview_id` = local-dev namespace name (wrangler keeps state in .wrangler/).
# If you fork: run `npx wrangler kv namespace create CALLS` and replace the id
# below with the one wrangler prints (your account, your namespace).
[[kv_namespaces]]
binding = "CALLS"
id = "124465323baf49fab2ae9254c26d3b35"
preview_id = "calls_local"

[observability]
enabled = true
